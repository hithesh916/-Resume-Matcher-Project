<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Matcher - Professional Edition</title>
    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo-container">
            <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        </div>
        <h1>Resume Matcher</h1>
        <p class="subtitle">AI-powered alignment for your next career move</p>
    </header>

    <main class="app-container">
        <div class="input-grid">
            <div class="left-panel">
                <div class="input-group">
                    <label for="resumeFile">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Upload Resume
                    </label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="resumeFile" accept=".pdf,.docx,.txt">
                    </div>
                    <p class="file-hint">Supported formats: PDF, DOCX, TXT</p>
                </div>

                <div class="input-group">
                    <label for="roleSelect">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                        </svg>
                        Target Role Template
                    </label>
                    <div class="select-wrapper">
                        <select id="roleSelect" class="form-control">
                            <option value="">-- Custom / Paste Below --</option>
                            <optgroup label="Software Engineering">
                                <option value="frontend">Frontend Developer</option>
                                <option value="backend">Backend Developer</option>
                                <option value="fullstack">Full Stack Developer</option>
                                <option value="mobile_dev">Mobile App Developer</option>
                                <option value="ios_dev">iOS Developer</option>
                                <option value="android_dev">Android Developer</option>
                                <option value="game_dev">Game Developer</option>
                                <option value="embedded_engineer">Embedded Systems Engineer</option>
                                <option value="blockchain_dev">Blockchain Developer</option>
                            </optgroup>
                            <optgroup label="Data & AI">
                                <option value="data_science">Data Scientist</option>
                                <option value="ml_engineer">Machine Learning Engineer</option>
                                <option value="ai_researcher">AI Researcher</option>
                                <option value="data_engineer">Data Engineer</option>
                                <option value="data_analyst">Data Analyst</option>
                            </optgroup>
                            <optgroup label="Infrastructure & Security">
                                <option value="devops">DevOps Engineer</option>
                                <option value="cloud_architect">Cloud Architect</option>
                                <option value="cybersecurity">Cybersecurity Analyst</option>
                                <option value="dba">Database Administrator</option>
                                <option value="sysadmin">System Administrator</option>
                                <option value="network_engineer">Network Engineer</option>
                                <option value="it_support">IT Support Specialist</option>
                            </optgroup>
                            <optgroup label="Quality & Design">
                                <option value="qa_automation">QA Automation Engineer</option>
                                <option value="qa_manual">QA Manual Tester</option>
                                <option value="ui_ux_designer">UI/UX Designer</option>
                                <option value="graphic_designer">Graphic Designer</option>
                            </optgroup>
                            <optgroup label="Product & Project Management">
                                <option value="tech_pm">Technical Product Manager</option>
                                <option value="pm">Product Manager (Non-Tech)</option>
                                <option value="project_manager">Project Manager</option>
                                <option value="scrum_master">Scrum Master</option>
                                <option value="business_analyst">Business Analyst</option>
                            </optgroup>
                            <optgroup label="Marketing & Sales">
                                <option value="marketing_manager">Marketing Manager</option>
                                <option value="digital_marketing">Digital Marketing Specialist</option>
                                <option value="content_writer">Content Writer</option>
                                <option value="seo_specialist">SEO Specialist</option>
                                <option value="social_media_manager">Social Media Manager</option>
                                <option value="sales_rep">Sales Representative</option>
                                <option value="account_executive">Account Executive</option>
                            </optgroup>
                            <optgroup label="Customer Success & Support">
                                <option value="customer_success">Customer Success Manager</option>
                                <option value="customer_support">Customer Support Representative</option>
                            </optgroup>
                            <optgroup label="Finance & Operations">
                                <option value="financial_analyst">Financial Analyst</option>
                                <option value="accountant">Accountant</option>
                                <option value="operations_manager">Operations Manager</option>
                                <option value="supply_chain">Supply Chain Manager</option>
                                <option value="retail_manager">Retail Store Manager</option>
                            </optgroup>
                            <optgroup label="HR, Legal & Admin">
                                <option value="hr_manager">Human Resources Manager</option>
                                <option value="recruiter">Recruiter / Talent Acquisition</option>
                                <option value="legal_counsel">Legal Counsel</option>
                                <option value="executive_assistant">Executive Assistant</option>
                                <option value="pr_manager">Public Relations Manager</option>
                                <option value="event_coordinator">Event Coordinator</option>
                            </optgroup>
                        </select>
                        <svg class="select-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="input-group full-height">
                    <label for="jobDescription">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Job Description
                    </label>
                    <textarea id="jobDescription" class="form-control"
                        placeholder="Paste the complete job description here..."></textarea>
                </div>
            </div>
        </div>

        <button id="matchBtn" class="primary-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            Analyze Match
        </button>

        <div id="results" class="results-container">
            <div class="results-header">
                <h2>Analysis Results</h2>
                <button id="downloadBtn" class="icon-btn" title="Download Report">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export Report
                </button>
            </div>

            <div class="score-card" id="scoreCard">
                <div class="score-circle" id="scoreCircle">
                    <span id="scoreValue">0%</span>
                </div>
                <div class="score-details">
                    <h3 id="scoreTitle">Match Score</h3>
                    <p id="matchStats" class="match-stats"></p>
                </div>
            </div>

            <div class="keywords-grid">
                <div class="keyword-section success-section">
                    <h3>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        Matched Skills
                    </h3>
                    <div id="matchedKeywords" class="keywords"></div>
                </div>

                <div class="keyword-section danger-section">
                    <h3>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                        Missing Skills
                    </h3>
                    <div id="missingKeywords" class="keywords"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Built with precision by <strong>Hithesh</strong></p>
    </footer>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <script src="script.js"></script>
</body>

</html>
